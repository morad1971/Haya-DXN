    <style>
        :root { 
            --dxn-green: #1b4d3e; 
            --gold: #d4af37; 
            --soft-bg: #f8fafc; 
        }
        body { 
            font-family: 'Vazirmatn', sans-serif; 
            background-color: var(--soft-bg); 
            padding-bottom: 140px; 
        }
        
        .nav-glass {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            position: fixed; 
            top: 0; 
            width: 100%; 
            z-index: 1000;
            border-bottom: 1px solid #e2e8f0;
        }
        .nav-banner {
            max-width: 1100px;
            margin: 0 auto;
            padding: 10px 14px;
            display: flex;
            gap: 8px;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
        }
        .nav-pill {
            text-decoration: none;
            color: #1b4d3e;
            background: #fff;
            border: 1px solid #e6e6e6;
            border-radius: 999px;
            padding: 7px 14px;
            font-size: 14px;
            font-weight: 700;
            transition: all 0.2s ease;
        }
        .nav-pill:hover {
            border-color: var(--gold);
            transform: translateY(-1px);
        }
        .nav-pill-register {
            background: #c8102e;
            color: #fff;
            border-color: #c8102e;
        }

        .header-gradient { 
            background: linear-gradient(135deg, var(--dxn-green) 0%, #2d6a58 100%); 
        }
        .product-card {
            background: white;
            border-radius: 24px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(226, 232, 240, 0.8);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            height: 100%;
        }
        .product-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 30px -10px rgba(0,0,0,0.1);
            border-color: var(--gold);
        }
        .pv-badge {
            background: linear-gradient(45deg, #2563eb, #3b82f6);
            color: white;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 900;
            box-shadow: 0 4px 10px rgba(37, 99, 235, 0.3);
        }
        .cat-btn {
            padding: 12px 24px;
            border-radius: 20px;
            background: white;
            color: #64748b;
            font-size: 0.9rem;
            font-weight: 700;
            border: 1px solid #e2e8f0;
            cursor: pointer;
            white-space: nowrap;
            transition: 0.3s;
        }
        .cat-btn.active {
            background: var(--gold);
            color: white;
            border-color: var(--gold);
            box-shadow: 0 8px 15px rgba(212, 175, 55, 0.3);
        }
        .add-btn {
            background: var(--dxn-green);
            color: white;
            width: 100%;
            padding: 12px;
            border-radius: 16px;
            font-weight: 700;
            transition: 0.3s;
            margin-top: auto;
        }
        .add-btn:active { transform: scale(0.95); }
        .modal {
            animation: modalPop 0.3s ease forwards;
            max-height: 90vh;
            overflow-y: auto;
        }
        @keyframes modalPop {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>

                    <div class="flex justify-between items-start mb-4">
                        <span class="text-[10px] font-black text-slate-300 uppercase">#${p.id}</span>
                        <span class="pv-badge">${p.pv} PV</span>
                    </div>
                    ${p.image ? `
                        <div class="w-full h-40 mb-4 overflow-hidden rounded-2xl bg-slate-50 flex items-center justify-center">
                            <img src="${p.image}" class="w-full h-full object-contain p-2" alt="${p.name}">
                        </div>
                    ` : ''}
                    <div class="text-center mb-6 grow">
                        <h3 class="text-sm font-black text-[#1b4d3e] leading-tight mb-3">${p.name}</h3>
                        <p class="text-[10px] text-slate-500 font-medium leading-relaxed px-2">${p.desc}</p>
                    </div>
                    <button onclick="showDetails(${p.id})" class="add-btn py-3 text-[11px] shadow-lg shadow-green-900/10">عرض التفاصيل</button>
                </div>
            `).join('');
        }

        function showDetails(id) {
            const p = products.find(item => item.id === id);
            if (!p) return;
            const modal = document.getElementById('productModal');
            const content = document.getElementById('modalContent');
            content.innerHTML = `
                <div class="flex justify-between items-center mb-4">
                    <span class="text-xs font-bold text-slate-400">#${p.id}</span>
                    <button onclick="closeModal()" class="text-3xl text-slate-400 hover:text-slate-600">×</button>
                </div>
                ${p.image ? `
                    <div class="w-full h-56 mb-6 overflow-hidden rounded-3xl bg-slate-50 border border-slate-100 flex items-center justify-center">
                        <img src="${p.image}" class="w-full h-full object-contain p-4" alt="${p.name}">
                    </div>
                ` : ''}
                <h2 class="text-xl font-black text-[#1b4d3e] mb-2">${p.name}</h2>
                <span class="pv-badge text-sm px-5 py-2 inline-block mb-4">${p.pv} PV</span>
                <div class="text-slate-600 leading-relaxed text-[15px] mb-8 italic">${p.longDesc}</div>
                <button onclick="addToCart('${p.name.replace(/'/g, "\\'")}'); closeModal();" 
                        class="w-full add-btn py-4 text-base shadow-xl shadow-green-900/20">
                    إضافة إلى السلة
                </button>
            `;
            modal.classList.remove('hidden');
            modal.classList.add('flex');
        }

        function closeModal() {
            const modal = document.getElementById('productModal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        }

        function filterItems(category, btn) {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            if (category === 'all') drawGrid(products);
            else drawGrid(products.filter(i => i.cat === category));
        }

        function addToCart(name) {
            cart.push(name);
            document.getElementById('cartNotify').classList.remove('hidden');
            document.getElementById('cartQty').innerText = cart.length;
        }

        function checkout() {
            if (cart.length === 0) return;
            const phoneNumber = "962780484425";
            const items = cart.join('%0A- ');
            const msg = `مرحباً هيا،%0Aأود طلب المنتجات التالية:%0A- ${items}`;
            window.open(`https://wa.me/${phoneNumber}?text=${msg}`, '_blank');
        }

        // تشغيل الصفحة
        drawGrid(products);
    </script>
</body>
</html>
