<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مركز التدريب | أكاديمية هيا اسكندراني</title>
   
    <!-- تحديث روابط المكتبات لضمان التحميل -->
    <script src="https://cloudflare.com"></script>
    <link href="https://googleapis.com" rel="stylesheet">
    <script src="https://jsdelivr.net"></script>
   
    <style>
        :root { --dxn-green: #1b4d3e; --gold: #d4af37; --soft-white: #fdfdfb; }
        * { font-family: 'Vazirmatn', sans-serif; margin: 0; padding: 0; box-sizing: border-box; }
        h1, h2, h3 { font-family: 'Amiri', serif !important; }
        body { background-color: #f4f7f6; color: #333; padding-top: 70px; }
        .nav-glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); position: fixed; top: 0; width: 100%; z-index: 1000; border-bottom: 1px solid #e5e7eb; }
        .step-card { background: white; border-radius: 24px; padding: 2rem; border: 1px solid #eef2f3; transition: all 0.3s ease; position: relative; overflow: hidden; }
        .step-card:hover { transform: translateY(-5px); box-shadow: 0 15px 30px rgba(0,0,0,0.05); }
        .step-number { position: absolute; top: -10px; left: -10px; font-size: 5rem; font-weight: 900; color: rgba(27, 77, 62, 0.05); z-index: 0; }
        .video-shorts-wrapper { max-width: 350px; margin: 0 auto 1.5rem auto; background: #1a1a1a; border-radius: 20px; overflow: hidden; aspect-ratio: 9/16; position: relative; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .video-standard-wrapper { background: #1a1a1a; border-radius: 16px; overflow: hidden; aspect-ratio: 16/9; margin-bottom: 1.5rem; position: relative; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>
    <nav class="nav-glass py-4 px-6">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <a href="../" class="flex items-center gap-2 text-[#1b4d3e] font-bold">
                <i data-lucide="home" class="w-5 h-5"></i>
                <span>الرئيسية</span>
            </a>
            <div class="flex gap-4 items-center">
                <span class="text-xs bg-gold/10 text-[#d4af37] px-3 py-1 rounded-full font-bold">أكاديمية التدريب</span>
            </div>
        </div>
    </nav>

    <header class="py-12 px-6 text-center bg-white border-b border-gray-100 mb-12">
        <div class="max-w-3xl mx-auto">
            <h1 class="text-4xl font-bold text-[#1b4d3e] mb-4">مرحباً بكِ في رحلة النجاح</h1>
            <p class="text-gray-500">خطة العمل التدريبية المكونة من 3 مراحل.</p>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-6 space-y-12 pb-20">
        <!-- المرحلة 1 -->
        <section class="step-card group">
            <span class="step-number">01</span>
            <div class="relative z-10">
                <div class="flex items-center gap-3 mb-4">
                    <div class="p-3 bg-[#1b4d3e] text-white rounded-2xl shadow-lg">
                        <i data-lucide="play-circle"></i>
                    </div>
                    <h2 class="text-2xl font-bold text-[#1b4d3e]">المرحلة الأولى: البداية الصحيحة</h2>
                </div>
                <div class="video-shorts-wrapper">
                    <iframe src="https://youtube-nocookie.com" 
                            allowfullscreen 
                            referrerpolicy="no-referrer-when-downgrade"></iframe>
                </div>
            </div>
        </section>

        <!-- المرحلة 2 -->
        <section class="step-card group border-r-4 border-[#d4af37]">
            <span class="step-number">02</span>
            <div class="relative z-10">
                <div class="flex items-center gap-3 mb-4">
                    <div class="p-3 bg-[#d4af37] text-white rounded-2xl shadow-lg">
                        <i data-lucide="sparkles"></i>
                    </div>
                    <h2 class="text-2xl font-bold text-[#1b4d3e]">المرحلة الثانية: الاستهلاك الذكي</h2>
                </div>
                <div class="video-shorts-wrapper">
                    <iframe src="https://youtube-nocookie.com" 
                            allowfullscreen 
                            referrerpolicy="no-referrer-when-downgrade"></iframe>
                </div>
            </div>
        </section>

        <!-- المرحلة 3 -->
        <section class="step-card group">
            <span class="step-number">03</span>
            <div class="relative z-10">
                <div class="flex items-center gap-3 mb-4">
                    <div class="p-3 bg-red-600 text-white rounded-2xl shadow-lg">
                        <i data-lucide="trending-up"></i>
                    </div>
                    <h2 class="text-2xl font-bold text-[#1b4d3e]">المرحلة الثالثة: مشروعك الاستثماري</h2>
                </div>
                <div class="video-standard-wrapper">
                    <iframe src="https://youtube-nocookie.com" 
                            allowfullscreen 
                            referrerpolicy="no-referrer-when-downgrade"></iframe>
                </div>
            </div>
        </section>
    </main>

    <script>
        // التأكد من عمل الأيقونات
        window.onload = function() {
            if (typeof lucide !== 'undefined') {
                lucide.createIcons();
            }
        };
    </script>
</body>
</html>
