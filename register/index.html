<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>انضمي لفريق هيا | تسجيل عضوية</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Vazirmatn:wght@100;300;400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --dxn-green: #1b4d3e;
            --gold: #d4af37;
        }
        * { font-family: 'Vazirmatn', sans-serif; box-sizing: border-box; }
        h1 { font-family: 'Amiri', serif !important; }
        
        body { 
            background: #f0f2f5;
            background-image: radial-gradient(circle at 10% 20%, rgba(27, 77, 62, 0.05) 0%, transparent 20%),
                              radial-gradient(circle at 90% 80%, rgba(212, 175, 55, 0.05) 0%, transparent 20%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
            padding: 40px;
        }

        .input-wrapper {
            position: relative;
            margin-bottom: 20px;
        }

        .input-field {
            width: 100%;
            padding: 14px 50px 14px 15px;
            background: #f8fafc;
            border: 2px solid #e2e8f0;
            border-radius: 18px;
            outline: none;
            transition: all 0.3s;
            font-size: 0.95rem;
            text-align: right;
        }

        .input-field:focus {
            border-color: var(--gold);
            background: white;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.1);
        }

        .field-icon {
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--dxn-green);
            opacity: 0.7;
        }

        .submit-btn {
            width: 100%;
            background: var(--dxn-green);
            color: white;
            padding: 16px;
            border-radius: 20px;
            font-weight: 900;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: all 0.3s;
            box-shadow: 0 10px 20px rgba(27, 77, 62, 0.2);
            cursor: pointer;
            border: none;
        }

        .submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(27, 77, 62, 0.3);
            background: #245d4b;
        }

        .submit-btn:disabled {
            background: #94a3b8;
            cursor: not-allowed;
            transform: none;
        }

        .loader {
            width: 20px;
            height: 20px;
            border: 3px solid #fff;
            border-bottom-color: transparent;
            border-radius: 50%;
            display: none;
            animation: rotation 1s linear infinite;
        }

        @keyframes rotation {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="glass-card">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-dxn-green mb-2 italic">نموذج الانضمام الرسمي</h1>
            <p class="text-gray-500 text-xs font-medium">املئي البيانات التالية بدقة للبدء مع فريق هيا</p>
        </div>

        <form id="regForm">
            <div class="input-wrapper">
                <span class="field-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                </span>
                <input type="text" name="name" id="name" required placeholder="الاسم الثلاثي (حسب الهوية)" class="input-field">
            </div>

            <div class="input-wrapper">
                <span class="field-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="16" rx="2"></rect><line x1="7" y1="8" x2="17" y2="8"></line><line x1="7" y1="12" x2="17" y2="12"></line><line x1="7" y1="16" x2="12" y2="16"></line></svg>
                </span>
                <input type="text" name="nationalId" id="nationalId" required placeholder="الرقم الوطني / رقم الهوية" class="input-field">
            </div>

            <div class="input-wrapper">
                <span class="field-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
                </span>
                <input type="tel" name="phone" id="phone" required placeholder="رقم الموبايل (واتساب)" class="input-field">
            </div>

            <div class="input-wrapper">
                <span class="field-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
                </span>
                <input type="text" name="address" id="address" required placeholder="مكان الإقامة (المدينة والمنطقة)" class="input-field">
            </div>

            <button type="submit" id="submitBtn" class="submit-btn">
                <span class="loader" id="btnLoader"></span>
                <span id="btnText">إرسال الطلب الآن</span>
                <svg id="btnIcon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            </button>
        </form>

        <div class="mt-6 text-center">
             <a href="../" class="text-xs text-gray-400 hover:text-gold transition-all">العودة للرئيسية</a>
        </div>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbwIbPyrYNFv8iMZOMq-5Jfnyr2omQLnBWkSUCcTNPr3NoK088QEjAzU11tjeWD_dycn2w/exec';
        
        const form = document.getElementById('regForm');
        const btn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');
        const btnIcon = document.getElementById('btnIcon');
        const btnLoader = document.getElementById('btnLoader');

        form.addEventListener('submit', e => {
            e.preventDefault();
            
            btn.disabled = true;
            btnText.innerText = "جاري الحفظ...";
            btnIcon.style.display = "none";
            btnLoader.style.display = "block";
            
            fetch(scriptURL, { 
                method: 'POST', 
                body: new FormData(form),
                mode: 'no-cors' 
            })
            .then(() => {
                alert('شكراً لكِ! تم استلام بياناتكِ بنجاح، ستتواصل معكِ القائدة هيا قريباً.');
                form.reset();
                // العودة للمجلد الرئيسي بدلاً من رابط المستودع القديم
                window.location.href = "../";
            })
            .catch(error => {
                console.error('Error!', error.message);
                alert('حدث خطأ فني، يرجى المحاولة مرة أخرى.');
                resetButton();
            });
        });

        function resetButton() {
            btn.disabled = false;
            btnText.innerText = "إرسال الطلب الآن";
            btnIcon.style.display = "block";
            btnLoader.style.display = "none";
        }
    </script>
</body>
</html>
