<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لائحة مشترياتي الذكية | فريق هيا اسكندراني</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Vazirmatn:wght@300;400;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        :root { --dxn-green: #1b4d3e; --gold: #d4af37; }
        * { font-family: 'Vazirmatn', sans-serif; box-sizing: border-box; }
        h1, h2, h3 { font-family: 'Amiri', serif !important; }
        body { background-color: #f9fbfd; padding-top: 70px; min-height: 100vh; }
        
        .nav-glass {
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px);
            position: fixed; top: 0; width: 100%; z-index: 1000; border-bottom: 1px solid #e2e8f0;
        }

        .product-item {
            background: white; border-radius: 15px; padding: 0.8rem;
            border: 1px solid #edf2f7; display: flex; align-items: center; justify-content: space-between;
            transition: border-color 0.2s;
        }
        .product-item:hover { border-color: var(--gold); }

        .counter-btn {
            width: 28px; height: 28px; border-radius: 8px;
            display: flex; align-items: center; justify-content: center; font-weight: bold;
        }

        .cart-sticky {
            position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%);
            width: 95%; max-width: 500px; background: var(--dxn-green);
            color: white; border-radius: 20px; padding: 1.2rem;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3); z-index: 100;
        }
    </style>
</head>
<body>

    <nav class="nav-glass py-4 px-6">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <a href="../index.html" class="flex items-center gap-2 text-[#1b4d3e] font-bold">
                <i data-lucide="arrow-right" class="w-5 h-5"></i>
                <span>العودة للرئيسية</span>
            </a>
            <span class="text-xs font-bold text-[#d4af37]">قائمة النقاط المباشرة</span>
        </div>
    </nav>

    <header class="py-6 px-6 text-center">
        <h1 class="text-3xl font-bold text-[#1b4d3e]">لائحة مشترياتي</h1>
        <p class="text-gray-500 text-sm">اختاري منتجاتكِ وحققي نصاب الـ 100 نقطة</p>
    </header>

    <main class="max-w-3xl mx-auto px-4 pb-48">
        
        <div class="mb-6">
            <h3 class="text-md font-bold text-gray-400 mb-3 flex items-center gap-2">
                <i data-lucide="coffee" class="w-4 h-4"></i> القهوة والمشروبات
            </h3>
            <div class="grid grid-cols-1 gap-3" id="beverages-list">
                </div>
        </div>

        <div class="mb-6">
            <h3 class="text-md font-bold text-gray-400 mb-3 flex items-center gap-2">
                <i data-lucide="sparkles" class="w-4 h-4"></i> العناية الشخصية
            </h3>
            <div class="grid grid-cols-1 gap-3" id="care-list"></div>
        </div>
    </main>

    <div class="cart-sticky">
        <div class="flex justify-between items-center mb-3">
            <div>
                <p class="text-[10px] uppercase opacity-70">إجمالي النقاط الحالية</p>
                <div class="flex items-baseline gap-2">
                    <span id="total-pv" class="text-3xl font-black">0.0</span>
                    <span class="text-sm font-bold text-[#d4af37]">PV</span>
                </div>
            </div>
            <div id="status-badge" class="bg-white/10 px-3 py-1 rounded-lg text-[10px] font-bold">
                باقي 100.0 نقطة
            </div>
        </div>
        <button onclick="window.print()" class="w-full bg-[#d4af37] text-white py-3 rounded-xl font-bold flex items-center justify-center gap-2 transition-all">
            <i data-lucide="file-text" class="w-4 h-4"></i> اعتماد اللائحة وطلبها
        </button>
    </div>

    <script>
        // مصفوفة المنتجات بناءً على ملفاتك في مجلد icons داخل tools
        const products = [
            { id: 'coffee_black', name: 'قهوة لينجزي السوداء', pv: 11.0, img: './icons/coffee.jpg', cat: 'bev' },
            { id: 'coffee_3in1', name: 'قهوة لينجزي 3 في 1', pv: 11.5, img: './icons/coffee.jpg', cat: 'bev' },
            { id: 'cocozhi', name: 'كوكوزي (كاكاو طبيعي)', pv: 14.0, img: './icons/cocozhi.jpg', cat: 'bev' },
            { id: 'tea', name: 'شاي لينجزي', pv: 10.0, img: './icons/coffee.jpg', cat: 'bev' },
            { id: 'toothpaste', name: 'معجون أسنان جانوزي', pv: 6.0, img: './icons/toothpaste.jpg', cat: 'care' },
            { id: 'soap', name: 'صابون جانوزي', pv: 5.0, img: './icons/soap.jpg', cat: 'care' },
            { id: 'shampoo', name: 'شامبو جانوزي', pv: 11.0, img: './icons/shampoo.jpg', cat: 'care' },
            { id: 'gano_oil', name: 'زيت جانو', pv: 8.0, img: './icons/shampoo.jpg', cat: 'care' }
        ];

        let cart = {};
        products.forEach(p => cart[p.id] = 0);

        function renderProducts() {
            const bevContainer = document.getElementById('beverages-list');
            const careContainer = document.getElementById('care-list');

            products.forEach(p => {
                const html = `
                    <div class="product-item">
                        <div class="flex items-center gap-3">
                            <img src="${p.img}" class="w-10 h-10 rounded-lg object-cover" alt="${p.name}" onerror="this.src='https://via.placeholder.com/40'">
                            <div>
                                <h4 class="font-bold text-xs">${p.name}</h4>
                                <p class="text-[10px] text-[#d4af37] font-bold">${p.pv} PV</p>
                            </div>
                        </div>
                        <div class="flex items-center gap-3">
                            <button onclick="updateQty('${p.id}', -1)" class="counter-btn bg-gray-100 text-gray-500">-</button>
                            <span id="qty-${p.id}" class="font-bold text-sm w-4 text-center">0</span>
                            <button onclick="updateQty('${p.id}', 1)" class="counter-btn bg-[#1b4d3e] text-white">+</button>
                        </div>
                    </div>
                `;
                if (p.cat === 'bev') bevContainer.innerHTML += html;
                else careContainer.innerHTML += html;
            });
        }

        function updateQty(id, delta) {
            cart[id] = Math.max(0, cart[id] + delta);
            document.getElementById(`qty-${id}`).innerText = cart[id];
            calculateTotal();
        }

        function calculateTotal() {
            let total = 0;
            products.forEach(p => {
                total += cart[p.id] * p.pv;
            });
            document.getElementById('total-pv').innerText = total.toFixed(1);

            const badge = document.getElementById('status-badge');
            if (total >= 100) {
                badge.innerText = "النصاب مكتمل! ✅";
                badge.style.background = "#22c55e";
            } else {
                badge.innerText = `باقي ${(100 - total).toFixed(1)} نقطة`;
                badge.style.background = "rgba(255,255,255,0.1)";
            }
        }

        window.onload = () => {
            renderProducts();
            lucide.createIcons();
        };
    </script>
</body>
</html>
