<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لائحة مشترياتي الذكية | فريق هيا اسكندراني</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Vazirmatn:wght@100;300;400;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        :root {
            --dxn-green: #1b4d3e;
            --gold: #d4af37;
            --soft-white: #fdfdfb;
        }
        * { font-family: 'Vazirmatn', sans-serif; margin: 0; padding: 0; box-sizing: border-box; }
        h1, h2, h3 { font-family: 'Amiri', serif !important; }
        body { background-color: #f9fbfd; color: #333; padding-top: 70px; min-height: 100vh; }
        
        .nav-glass {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            position: fixed; top: 0; width: 100%; z-index: 1000;
            border-bottom: 1px solid #e2e8f0;
        }

        .product-item {
            background: white;
            border-radius: 20px;
            padding: 1rem;
            border: 1px solid #edf2f7;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .product-item:hover { border-color: var(--gold); }

        .counter-btn {
            width: 32px;
            height: 32px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            cursor: pointer;
        }

        .cart-sticky {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 500px;
            background: var(--dxn-green);
            color: white;
            border-radius: 25px;
            padding: 1.5rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            z-index: 100;
        }
    </style>
</head>
<body>

    <nav class="nav-glass py-4 px-6">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <a href="../index.html" class="flex items-center gap-2 text-[#1b4d3e] font-bold">
                <i data-lucide="home" class="w-5 h-5"></i>
                <span>الرئيسية</span>
            </a>
            <span class="text-xs font-bold text-[#d4af37] uppercase italic">أدوات النجاح</span>
        </div>
    </nav>

    <header class="py-10 px-6 text-center">
        <h1 class="text-3xl font-bold text-[#1b4d3e] mb-2">لائحة مشتريات الشهر</h1>
        <p class="text-gray-500 text-sm">حددي احتياجاتكِ وراقبي مجموع نقاطكِ (PV) فوراً.</p>
    </header>

    <main class="max-w-3xl mx-auto px-6 pb-48">
        
        <div class="mb-8">
            <h3 class="text-lg font-bold text-gray-400 mb-4 flex items-center gap-2">
                <i data-lucide="coffee" class="w-4 h-4"></i> المشروبات الصحية
            </h3>
            <div class="space-y-3">
                <div class="product-item">
                    <div class="flex items-center gap-4">
                        <img src="../images/Black-Coffee.webp" class="w-12 h-12 object-contain" alt="Coffee" onerror="this.src='https://via.placeholder.com/50'">
                        <div>
                            <h4 class="font-bold text-sm">قهوة لينجزي السوداء</h4>
                            <p class="text-[10px] text-[#d4af37] font-bold">11.0 PV</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-3">
                        <button onclick="updateQty('coffee', -1)" class="counter-btn bg-gray-100 text-gray-500">-</button>
                        <span id="qty-coffee" class="font-bold w-4 text-center">0</span>
                        <button onclick="updateQty('coffee', 1)" class="counter-btn bg-[#1b4d3e] text-white">+</button>
                    </div>
                </div>
                <div class="product-item">
                    <div class="flex items-center gap-4">
                        <img src="../images/Cocozhi.webp" class="w-12 h-12 object-contain" alt="Cocozhi" onerror="this.src='https://via.placeholder.com/50'">
                        <div>
                            <h4 class="font-bold text-sm">كوكوزي (كاكاو طبيعي)</h4>
                            <p class="text-[10px] text-[#d4af37] font-bold">14.0 PV</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-3">
                        <button onclick="updateQty('coco', -1)" class="counter-btn bg-gray-100 text-gray-500">-</button>
                        <span id="qty-coco" class="font-bold w-4 text-center">0</span>
                        <button onclick="updateQty('coco', 1)" class="counter-btn bg-[#1b4d3e] text-white">+</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="mb-8">
            <h3 class="text-lg font-bold text-gray-400 mb-4 flex items-center gap-2">
                <i data-lucide="shield-plus" class="w-4 h-4"></i> المكملات والوقاية
            </h3>
            <div class="space-y-3">
                <div class="product-item">
                    <div class="flex items-center gap-4">
                        <img src="../images/reishi.webp" class="w-12 h-12 object-contain" alt="Reishi" onerror="this.src='https://via.placeholder.com/50'">
                        <div>
                            <h4 class="font-bold text-sm">الفطر الريشي (مسحوق)</h4>
                            <p class="text-[10px] text-[#d4af37] font-bold">70.0 PV</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-3">
                        <button onclick="updateQty('reishi', -1)" class="counter-btn bg-gray-100 text-gray-500">-</button>
                        <span id="qty-reishi" class="font-bold w-4 text-center">0</span>
                        <button onclick="updateQty('reishi', 1)" class="counter-btn bg-[#1b4d3e] text-white">+</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div class="cart-sticky">
        <div class="flex justify-between items-center mb-4">
            <div>
                <p class="text-[10px] uppercase opacity-70">إجمالي النقاط لهذا الشهر</p>
                <div class="flex items-baseline gap-2">
                    <span id="total-pv" class="text-3xl font-black">0.0</span>
                    <span class="text-sm font-bold text-[#d4af37]">PV</span>
                </div>
            </div>
            <div id="status-badge" class="bg-white/10 px-4 py-2 rounded-xl text-[10px] font-bold">
                لم تكتمل الـ 100 نقطة
            </div>
        </div>
        <button onclick="window.print()" class="w-full bg-[#d4af37] text-white py-3 rounded-xl font-bold flex items-center justify-center gap-2 hover:shadow-lg transition-all">
            <i data-lucide="download" class="w-4 h-4"></i> حفظ اللائحة كـ PDF للفرع
        </button>
    </div>

    <script>
        // تفعيل الأيقونات
        lucide.createIcons();

        const prices = {
            coffee: 11,
            coco: 14,
            reishi: 70
        };

        let cart = {
            coffee: 0, coco: 0, reishi: 0
        };

        function updateQty(item, delta) {
            if (!cart.hasOwnProperty(item)) return;
            cart[item] = Math.max(0, cart[item] + delta);
            document.getElementById(`qty-${item}`).innerText = cart[item];
            calculateTotal();
        }

        function calculateTotal() {
            let total = 0;
            for (let item in cart) {
                total += cart[item] * (prices[item] || 0);
            }
            document.getElementById('total-pv').innerText = total.toFixed(1);

            const badge = document.getElementById('status-badge');
            if (total >= 100) {
                badge.innerText = "تم تفعيل العمولات! ✅";
                badge.style.background = "#22c55e"; // Green
            } else {
                badge.innerText = `باقي لكِ ${(100 - total).toFixed(1)} نقطة`;
                badge.style.background = "rgba(255,255,255,0.1)";
            }
        }
    </script>
</body>
</html>
